# ekf_sim.yaml — SIMULATION VERSION
# ──────────────────────────────────────────────────────────────────────────────
# CHANGES FROM REAL ROBOT VERSION:
#   1. use_sim_time: false → true
#
# Pipeline:
#   Gazebo diff_drive plugin → /odom ─┐
#                                      ├→ EKF → /odometry/filtered → SLAM
#   Gazebo IMU plugin → /imu/data ────┘
# ──────────────────────────────────────────────────────────────────────────────

ekf_filter_node:
  ros__parameters:

    # ── Core settings ──────────────────────────────────────────────────────────
    frequency: 20.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    use_sim_time: true          # ← CHANGED: false → true
    debug: false
    smoothed_lagged_data: true

    # Frame IDs
    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_link
    world_frame:     odom

    # ── Input 0: Wheel odometry (/odom) ────────────────────────────────────────
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true, false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative:     false
    odom0_queue_size:   5

    # ── Input 1: IMU (/imu/data) ──────────────────────────────────────────────
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 5
    imu0_remove_gravitational_acceleration: true
    imu0_pose_rejection_threshold:  0.8
    imu0_twist_rejection_threshold: 0.8

